<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASL | Gallery Archive</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Analytical Spectroscopy Laboratory" />
    <meta property="og:title" content="ASL | Gallery Archive" />
    <meta
      property="og:description"
      content="Gallery archive of Hanyang University Analytical Spectroscopy Laboratory (ASL)."
    />
    <meta property="og:image" content="https://asl-gules-phi.vercel.app/assets/og-prof-photo.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ASL | Gallery Archive" />
    <meta
      name="twitter:description"
      content="Gallery archive of Hanyang University Analytical Spectroscopy Laboratory (ASL)."
    />
    <meta name="twitter:image" content="https://asl-gules-phi.vercel.app/assets/og-prof-photo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./assets/asl-favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-mark">ASL</span>
        <span class="brand-text">Analytical Spectroscopy Laboratory</span>
      </a>
      <nav class="nav">
        <a href="./index.html#about">About</a>
        <a href="./index.html#research">Research</a>
        <a href="./publication.html">Publications</a>
        <a href="./index.html#professor">Professor</a>
        <a href="./index.html#members">Members</a>
        <a href="./gallery.html">Gallery</a>
      </nav>
      <a class="header-cta" href="./index.html">Home</a>
    </header>

    <main class="page-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow">Gallery</p>
          <h1>Gallery Archive</h1>
        </div>
      </div>
      <section class="gallery-toolbar" aria-label="Gallery controls">
        <p id="galleryCoverage" class="publication-authors">Loading migrated gallery coverage...</p>
        <div class="gallery-toolbar-row">
          <input id="gallerySearch" class="gallery-search" type="search" placeholder="Search title..." aria-label="Search gallery title" />
          <div class="gallery-pager">
            <button id="galleryPrev" class="btn btn-ghost" type="button">Prev</button>
            <span id="galleryPageInfo" class="publication-authors">1 / 1</span>
            <button id="galleryNext" class="btn btn-ghost" type="button">Next</button>
          </div>
        </div>
      </section>

      <div id="galleryGrid" class="gallery-grid gallery-grid-archive" aria-live="polite"></div>
    </main>

    <dialog id="galleryPostModal" class="author-modal">
      <div class="author-modal-head">
        <div>
          <h3 id="galleryModalTitle">Gallery Entry</h3>
          <p id="galleryModalMeta" class="publication-authors">-</p>
          <p id="galleryModalDesc" class="gallery-modal-desc">본문 텍스트를 불러오는 중입니다.</p>
        </div>
        <button id="galleryModalClose" class="modal-close" type="button" aria-label="Close">×</button>
      </div>
      <div class="gallery-modal-body">
        <button id="galleryImagePrev" class="member-nav prev" type="button" aria-label="Previous image">‹</button>
        <figure class="gallery-modal-figure">
          <img id="galleryModalImage" src="./assets/publication-placeholder.svg" alt="Gallery image" loading="lazy" />
          <figcaption id="galleryImageCounter">1 / 1</figcaption>
        </figure>
        <button id="galleryImageNext" class="member-nav next" type="button" aria-label="Next image">›</button>
      </div>
      <div class="author-modal-foot">
        <a id="gallerySourceLink" class="btn btn-ghost" href="#" target="_blank" rel="noopener noreferrer">Open Source Post</a>
      </div>
    </dialog>

    <script src="./admin-config.js"></script>
    <script src="./public-data.js"></script>
    <script src="./gallery-archive.js"></script>
  </body>
</html>
