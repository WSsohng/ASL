<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASL | Admin Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-mark">ASL</span>
        <span class="brand-text">Admin Console</span>
      </a>
      <nav class="nav">
        <a href="./index.html">Home</a>
        <a href="./publication.html">Publications</a>
        <a href="./gallery.html">Gallery</a>
      </nav>
      <a class="header-cta" href="./index.html">Back</a>
    </header>

    <main class="page-shell admin-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow">Administration</p>
          <h1 class="archive-title-single-line">ASL Data Console</h1>
        </div>
      </div>

      <section id="adminAuthCard" class="admin-card">
        <h2>Admin Sign-in</h2>
        <p class="publication-authors">
          Supabase Auth sign-in is required. Only users with <code>profiles.role = admin</code> can upload.
        </p>
        <form id="adminLoginForm" class="admin-form-grid">
          <label>
            <span>Email</span>
            <input id="adminEmail" type="email" required autocomplete="username" />
          </label>
          <label>
            <span>Password</span>
            <input id="adminPassword" type="password" required autocomplete="current-password" />
          </label>
          <button class="btn btn-primary" type="submit">Sign In</button>
        </form>
      </section>

      <section id="adminApp" class="admin-card admin-hidden" aria-hidden="true">
        <div class="admin-head-row">
          <div>
            <h2>Upload Workspace</h2>
            <p id="adminUserInfo" class="publication-authors">-</p>
          </div>
          <button id="adminSignOutBtn" class="btn btn-ghost" type="button">Sign Out</button>
        </div>

        <div class="admin-tab-row" role="tablist" aria-label="Admin sections">
          <button class="admin-tab is-active" data-tab="publication" type="button" role="tab" aria-selected="true">Publication</button>
          <button class="admin-tab" data-tab="gallery" type="button" role="tab" aria-selected="false">Gallery</button>
          <button class="admin-tab" data-tab="members" type="button" role="tab" aria-selected="false">Members</button>
        </div>

        <section class="admin-pane is-active" data-pane="publication">
          <h3>Publication Upload</h3>
          <form id="publicationForm" class="admin-form-grid">
            <label><span>Title</span><input id="pubTitle" type="text" required /></label>
            <label><span>Year</span><input id="pubYear" type="number" min="1990" max="2100" required /></label>
            <label><span>Journal</span><input id="pubJournal" type="text" required /></label>
            <label><span>Authors</span><textarea id="pubAuthors" rows="3" required></textarea></label>
            <label><span>DOI (optional)</span><input id="pubDoi" type="text" /></label>
            <label><span>Citations</span><input id="pubCitations" type="number" min="0" value="0" /></label>
            <label><span>IF</span><input id="pubImpactFactor" type="number" step="0.1" min="0" /></label>
            <label><span>Graphical Abstract (optional)</span><input id="pubImageFile" type="file" accept="image/*" /></label>
            <button class="btn btn-primary" type="submit">Save Publication</button>
          </form>
          <div id="pubRecentList" class="admin-list"></div>
        </section>

        <section class="admin-pane" data-pane="gallery">
          <h3>Gallery Upload</h3>
          <form id="galleryForm" class="admin-form-grid">
            <label><span>Title</span><input id="galTitle" type="text" required /></label>
            <label><span>Date</span><input id="galDate" type="date" /></label>
            <label><span>Author</span><input id="galAuthor" type="text" /></label>
            <label><span>Source URL (optional)</span><input id="galSourceUrl" type="url" /></label>
            <label><span>Images</span><input id="galFiles" type="file" accept="image/*" multiple required /></label>
            <button class="btn btn-primary" type="submit">Save Gallery Entry</button>
          </form>
          <div id="galRecentList" class="admin-list"></div>
        </section>

        <section class="admin-pane" data-pane="members">
          <h3>Member Upload</h3>
          <form id="memberForm" class="admin-form-grid">
            <label><span>Name</span><input id="memName" type="text" required /></label>
            <label><span>Role</span><input id="memRole" type="text" required /></label>
            <label><span>Email</span><input id="memEmail" type="email" /></label>
            <label><span>Career</span><input id="memCareer" type="text" /></label>
            <label>
              <span>Track</span>
              <select id="memTrack">
                <option value="current">Current</option>
                <option value="alumni">Alumni</option>
                <option value="faculty">Faculty</option>
              </select>
            </label>
            <label><span>Profile Image (optional)</span><input id="memImageFile" type="file" accept="image/*" /></label>
            <button class="btn btn-primary" type="submit">Save Member</button>
          </form>
          <div id="memRecentList" class="admin-list"></div>
        </section>
      </section>

      <p id="adminStatus" class="publication-authors admin-status">Initializing...</p>
    </main>

    <script src="./admin-config.js"></script>
    <script type="module" src="./admin-crud.js"></script>
  </body>
</html>
