<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASL | Publication Archive</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Analytical Spectroscopy Laboratory" />
    <meta property="og:title" content="ASL | Publication Archive" />
    <meta
      property="og:description"
      content="Publication archive of Hanyang University Analytical Spectroscopy Laboratory (ASL)."
    />
    <meta property="og:image" content="https://asl-gules-phi.vercel.app/assets/og-prof-photo.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ASL | Publication Archive" />
    <meta
      name="twitter:description"
      content="Publication archive of Hanyang University Analytical Spectroscopy Laboratory (ASL)."
    />
    <meta name="twitter:image" content="https://asl-gules-phi.vercel.app/assets/og-prof-photo.jpg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./assets/asl-favicon.svg" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">
        <img src="./assets/asl-favicon.svg" class="brand-logo" alt="ASL logo" />

        <span class="brand-lines">
          <span class="brand-main">분광분석연구실</span>
          <span class="brand-sub">Analytical Spectroscopy Laboratory</span>
        </span>
      </a>
      <nav class="nav">
        <a href="./index.html#top">About</a>
        <a href="./index.html#research">Research</a>
        <a href="./publication.html">Publications</a>
        <a href="./index.html#professor">Professor</a>
        <a href="./members.html">Members</a>
        <a href="./gallery.html">Gallery</a>
      </nav>
      <div class="header-actions">
        <a class="header-intern-btn" href="./intern.html">인턴 지원</a>
        <a class="header-cta" href="./index.html">Home</a>
      </div>
    </header>

    <main class="page-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow">Publications</p>
          <h1 class="archive-title-single-line">Publication Archive</h1>
        </div>
      </div>

      <div id="pubFilter" class="pub-years" aria-label="Publication years"></div>

      <section class="pub-catalog" id="pubCatalog" aria-live="polite">
        <p class="publication-authors">Loading publication records...</p>
      </section>
    </main>
    <dialog id="authorModal" class="author-modal">
      <div class="author-modal-head">
        <h2 id="authorModalTitle">Author</h2>
        <button id="authorModalClose" type="button" aria-label="Close">x</button>
      </div>
      <div class="author-modal-layout">
        <aside class="author-profile">
          <div class="author-photo-slot">
            <img id="authorProfileImage" class="author-photo" src="./assets/publication-placeholder.svg" alt="Author profile image" loading="lazy" />
          </div>
          <p class="author-profile-name" id="authorProfileName">-</p>
          <a id="authorProfileScopusLink" class="author-paper-scholar" href="#" target="_blank" rel="noopener noreferrer" style="display:none;">View on Scopus ↗</a>
        </aside>
        <div id="authorModalBody" class="author-modal-body"></div>
      </div>
    </dialog>

    <button id="backToTopBtn" class="back-to-top" aria-label="Back to top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ TOP</button>

    <script src="./admin-config.js"></script>
    <script src="./public-data.js"></script>
    <script>
      (() => {
        const filterEl = document.getElementById("pubFilter");
        const catalogEl = document.getElementById("pubCatalog");
        const modalEl = document.getElementById("authorModal");
        const modalTitleEl = document.getElementById("authorModalTitle");
        const modalBodyEl = document.getElementById("authorModalBody");
        const modalCloseBtn = document.getElementById("authorModalClose");
        const authorProfileNameEl = document.getElementById("authorProfileName");
        const authorProfileScopusLinkEl = document.getElementById("authorProfileScopusLink");
        const authorProfileImageEl = document.getElementById("authorProfileImage");
        const memberPhotoMap = new Map();
        const clickableAuthorsSet = new Set(); /* normalized names of current + alumni only */
        const PROFILE_FALLBACK_IMAGE = "./assets/publication-placeholder.svg";
        const authorsToEntries = new Map();
        let allData = {};
        const MEMBER_NAMES = [
          "Hoeil Chung",
          "Bui Thu Thuy", "Yunjung Kim", "Haeseong Jeong", "Seongsoo Jeong", "Eunbi Jang",
          "Sangjae Kim", "Juyoung Park", "Junhee Kim", "Younghum Cho",
          "Su-youn Han", "Minsik Hwang", "Soohwa Cho", "Seungjae Lee", "Young su Kim", "Youngbok Lee",
          "Sanghee Nah", "Chulwon Kwak", "Jintae Han", "Seokchan Park", "Minjung Kim", "Kyungtag Ryu",
          "Jiyoung Park", "Yongdan Kim", "Changyong Oh", "Jaejin Kim", "Hankyu Namkung", "Yeojin Lee",
          "Mooeung Kim", "Tran Ngoc Huan", "Jihye Yoon", "Sanguk Lee", "Kayeong Shin", "Jinah Lee",
          "Saetbyeol Kim", "Jinyoung Hwang", "Pham Khac Duy", "Seul-a Jeon", "Dong-hwi Kim",
          "Dong-hyun Ryoo", "Rehab Eid Al-Rashidy", "Chang Kyeol", "Tshishimbi Muya, Jules C",
          "Daun Seol", "Vu Duy Tung", "Youngtaek Ma", "Chang Hwan Eum", "Yoonjeong Lee",
          "Euna Chong", "Eunjin Jang", "Woosuk Sohng", "Sang hoon Cho", "Yoonji Kim",
          "Jiwoo Cho", "Mieun Kim", "Sanghoon Cho", "Sang-Ho Nam", "Yonghoon Lee"
        ];
        const normalizeName = (s = "") =>
          String(s)
            .toLowerCase()
            .replace(/[\u2020*]/g, "")
            .replace(/\d+/g, "")
            .replace(/[^a-z]/g, "");
        const makeNameAliases = (name) => {
          const clean = name.replace(",", " ").replace(/\s+/g, " ").trim();
          const tokens = clean.split(" ").filter(Boolean);
          const aliases = new Set([normalizeName(clean), normalizeName(name)]);
          if (tokens.length >= 2) {
            aliases.add(normalizeName(`${tokens[0]} ${tokens[tokens.length - 1]}`));
            aliases.add(normalizeName(`${tokens[tokens.length - 1]} ${tokens[0]}`));
            aliases.add(normalizeName(`${tokens[0][0]} ${tokens[tokens.length - 1]}`));
          }
          if (tokens.length === 3) {
            const [a, b, c] = tokens;
            [
              `${a} ${c} ${b}`,
              `${b} ${a} ${c}`,
              `${b} ${c} ${a}`,
              `${c} ${a} ${b}`,
              `${c} ${b} ${a}`
            ].forEach((variant) => aliases.add(normalizeName(variant)));
          }
          if (/hoeil/i.test(name) && /chung/i.test(name)) aliases.add("hchung");
          return [...aliases].filter(Boolean);
        };
        const MEMBER_INDEX = MEMBER_NAMES.map((name) => ({ name, aliases: makeNameAliases(name) }));
        const putMemberPhoto = (name, image) => {
          const key = normalizeName(name);
          if (!key || !image || memberPhotoMap.has(key)) return;
          memberPhotoMap.set(key, image);
        };
        const buildMemberPhotoMap = (memberPayload) => {
          memberPhotoMap.clear();
          memberScopusMap.clear();
          clickableAuthorsSet.clear();
          const currentMembers = Array.isArray(memberPayload?.current_members) ? memberPayload.current_members : [];
          const alumniMembers = Array.isArray(memberPayload?.alumni) ? memberPayload.alumni : [];
          const faculty = Array.isArray(memberPayload?.faculty) ? memberPayload.faculty : [];
          /* Only current + alumni members are clickable */
          [...currentMembers, ...alumniMembers].forEach((member) => {
            clickableAuthorsSet.add(normalizeName(member.name));
            makeNameAliases(member.name).forEach((alias) => {
              if (alias) clickableAuthorsSet.add(alias);
            });
          });
          [...currentMembers, ...alumniMembers, ...faculty].forEach((member) => {
            /* Build Scopus ID map from DB data */
            const sid = member?.scopus_id || "";
            if (sid) {
              makeNameAliases(member.name).forEach((alias) => {
                if (alias) memberScopusMap.set(alias, sid);
              });
              memberScopusMap.set(normalizeName(member.name), sid);
            }
            const image = String(member?.image || "").trim();
            if (!image) return;
            putMemberPhoto(member.name, image);
            makeNameAliases(member.name).forEach((alias) => {
              if (!alias || memberPhotoMap.has(alias)) return;
              memberPhotoMap.set(alias, image);
            });
          });
        };
        const getMemberProfileImage = (authorName = "") => {
          const exact = memberPhotoMap.get(normalizeName(authorName));
          if (exact) return exact;
          const resolved = resolveMember(authorName);
          if (resolved) {
            const matched = memberPhotoMap.get(normalizeName(resolved.name));
            if (matched) return matched;
          }
          return PROFILE_FALLBACK_IMAGE;
        };
        const esc = (value = "") =>
          String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");
        const normalizeJournalKey = (journal = "") =>
          journal
            .toLowerCase()
            .replace(/\([^)]*\)/g, " ")
            .replace(/\d{4}/g, " ")
            .replace(/&/g, " and ")
            .replace(/[.,:;]+/g, " ")
            .replace(/\bvol\b/g, " ")
            .replace(/\bvolumes?\b/g, " ")
            .replace(/\bno\b/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        const JOURNAL_CATEGORY_RULES = [
          { re: /\bfood chemistry\b/i, value: { category: "Food Science", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\btalanta\b/i, value: { category: "Analytical Chemistry", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\banalytica chimica acta\b/i, value: { category: "Analytical Chemistry", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\banalyst\b/i, value: { category: "Analytical Chemistry", quartile: "Q2", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bmicrochemical journal\b/i, value: { category: "Analytical Chemistry", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bspectrochimica acta part a\b/i, value: { category: "Spectroscopy", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bchemical engineering journal\b/i, value: { category: "Chemical Engineering", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bfuel\b/i, value: { category: "Energy & Fuels", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bjournal of food composition\b.*\banalysis\b/i, value: { category: "Food Science", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bacs appl\.\s*nano\s*mater|\bacs appl nano mater\b/i, value: { category: "Materials Science", quartile: "Q1", source: "SJR", indexedIn: "Scopus" } },
          { re: /\bacs omega\b/i, value: { category: "Multidisciplinary Chemistry", quartile: "Q2", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bpolymer\b/i, value: { category: "Polymer Science", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bsensors\b.*\bactuators\b.*\bb\b/i, value: { category: "Instrumentation", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bvibrational spectroscopy\b/i, value: { category: "Spectroscopy", quartile: "Q2", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bapplied spectroscopy\b/i, value: { category: "Spectroscopy", quartile: "Q2", source: "JCR", indexedIn: "SCIE" } },
          { re: /\brsc adv\b/i, value: { category: "Chemistry, Multidisciplinary", quartile: "Q2", source: "JCR", indexedIn: "SCIE" } },
          { re: /\bacs\b.*\bappl\b.*\bmater\b.*\binterfaces\b|\bacs applied materials interfaces\b/i, value: { category: "Materials Science", quartile: "Q1", source: "JCR", indexedIn: "SCIE" } }
        ];
        const quartileToTopPercent = (q = "") => {
          const v = String(q || "").toUpperCase();
          if (v === "Q1") return "Top 25%";
          if (v === "Q2") return "Top 50%";
          if (v === "Q3") return "Top 75%";
          if (v === "Q4") return "Top 100%";
          return "";
        };
        const getJournalCategoryMetrics = (journal = "") => {
          const key = normalizeJournalKey(journal);
          const matched = JOURNAL_CATEGORY_RULES.find((rule) => rule.re.test(key));
          return matched
            ? matched.value
            : { category: "Category pending curation", quartile: "-", source: "", indexedIn: "Manual check" };
        };
        const splitAuthors = (authorText = "") =>
          authorText
            .split(",")
            .map((v) => v.trim())
            .filter(Boolean);
        const normalizeAuthorMarkers = (text = "") =>
          String(text || "")
            .replace(/[\u2020\u2021]/g, "^1")
            .replace(/[\u00A2\u00D3\u00D2\u00F3\u00C7\u00E7]/g, "^1")
            .replace(/\^1{2,}/g, "^1")
            .replace(/\*{2,}/g, "*")
            .replace(/\s+/g, " ")
            .trim();
        const applyAuthorCorrections = (authorText = "", item = {}) => {
          let v = normalizeAuthorMarkers(authorText);
          const title = String(item?.title || "").toLowerCase();
          if (
            title.includes("evaluation of an autoencoder as a feature extraction tool for near-infrared spectroscopic discriminant analysis")
          ) {
            v = v
              .replace(/\bSeeun Jo\b(?!\^1)/i, "Seeun Jo^1")
              .replace(/\bWoosuk Sohng\b(?!\^1)/i, "Woosuk Sohng^1");
          }
          return v;
        };
        const parseAuthorToken = (token = "") => {
          let raw = normalizeAuthorMarkers(token)
            .replace(/([A-Za-z])[^,A-Za-z0-9\s.\-^*]+$/u, "$1^1")
            .replace(/\s+1$/, "^1")
            .replace(/\s+\*$/, "*")
            .replace(/\s+\^1$/, "^1");
          const markerMatch = raw.match(/(\^1|\*)+$/);
          const markers = markerMatch ? markerMatch[0] : "";
          const base = markers ? raw.slice(0, -markers.length).trim() : raw;
          return {
            base,
            hasEqualContribution: markers.includes("^1"),
            hasCorresponding: markers.includes("*")
          };
        };
        const renderAuthorLabel = (token = "") => {
          const parsed = parseAuthorToken(token);
          const eq = parsed.hasEqualContribution ? "<sup>1</sup>" : "";
          const corr = parsed.hasCorresponding ? "<sup>*</sup>" : "";
          return `${esc(parsed.base)}${eq}${corr}`;
        };
        const splitName = (name = "") => {
          const parts = name.replace(",", " ").split(/\s+/).filter(Boolean);
          return { first: parts[0] || "", last: parts[parts.length - 1] || "" };
        };
        /* Scopus IDs confirmed from Scopus / ScholarWorks Hanyang */
        const KNOWN_SCOPUS_IDS = {
          "Hoeil Chung":    "7404006949",
          "Haeseong Jeong": "57224628166"
          /* additional IDs are loaded from DB via memberScopusMap */
        };

        /* Populated after member DB loads */
        const memberScopusMap = new Map(); /* normalizedName → scopus_id */

        const getMemberScopusId = (authorName = "") => {
          const key = normalizeName(authorName);
          if (memberScopusMap.has(key)) return memberScopusMap.get(key);
          const known = Object.entries(KNOWN_SCOPUS_IDS).find(([n]) => normalizeName(n) === key);
          return known ? known[1] : null;
        };

        const getScopusUrl = (scopusId) =>
          `https://www.scopus.com/authid/detail.uri?authorId=${encodeURIComponent(scopusId)}`;

        const getScopusSearchUrl = (name = "") => {
          const sid = getMemberScopusId(name);
          if (sid) return getScopusUrl(sid);
          const { first, last } = splitName(name);
          const query = `${last} ${first} hanyang`;
          return `https://www.scopus.com/search/form.uri?display=authorLookup&origin=resultslist&st1=${encodeURIComponent(query)}`;
        };

        const resolveMember = (authorToken = "") => {
          const normalized = normalizeName(authorToken);
          if (!normalized) return null;
          const exact = MEMBER_INDEX.find((member) => member.aliases.some((alias) => alias === normalized));
          if (exact) return exact;
          const near = MEMBER_INDEX.find((member) =>
            member.aliases.some((alias) => {
              if (!alias || alias.length < 5) return false;
              const delta = Math.abs(alias.length - normalized.length);
              return delta <= 1 && (normalized.startsWith(alias) || alias.startsWith(normalized));
            })
          );
          return near || null;
        };
        const isClickableAuthor = (authorName = "") => {
          const key = normalizeName(authorName);
          return clickableAuthorsSet.has(key);
        };
        const renderAuthors = (authorText = "") => {
          const tokens = splitAuthors(authorText);
          return tokens
            .map((token) => {
              const parsed = parseAuthorToken(token);
              const member = resolveMember(parsed.base);
              const label = renderAuthorLabel(token);
              if (!member || !isClickableAuthor(member.name)) return `<span class="author-plain">${label}</span>`;
              return `<button class="author-chip" type="button" data-author="${esc(member.name)}">${label}</button>`;
            })
            .join('<span class="author-sep">, </span>');
        };
        const renderAuthorsInline = (authorText = "") =>
          splitAuthors(authorText)
            .map((token) => renderAuthorLabel(token))
            .join('<span class="author-sep">, </span>');
        const getDisplayAuthors = (item) => {
          const candidate = (item.authors_marked || "").trim();
          if (!candidate) return applyAuthorCorrections(item.authors || "", item);
          if (/\b(19|20)\d{2}\b/.test(candidate)) return applyAuthorCorrections(item.authors || "", item);
          if (candidate.length > 420) return applyAuthorCorrections(item.authors || "", item);
          return applyAuthorCorrections(candidate, item);
        };
        const normalizeTitle = (title = "") =>
          title
            .toLowerCase()
            .replace(/[^a-z0-9]/g, " ")
            .replace(/\s+/g, " ")
            .trim();
        const titleSimilarity = (a, b) => {
          const as = new Set(normalizeTitle(a).split(" ").filter((t) => t.length > 2));
          const bs = new Set(normalizeTitle(b).split(" ").filter((t) => t.length > 2));
          if (!as.size || !bs.size) return 0;
          let overlap = 0;
          as.forEach((t) => {
            if (bs.has(t)) overlap += 1;
          });
          return overlap / Math.max(as.size, bs.size);
        };
        const orderForYear = (year) => {
          if (year === "1995-1999") return 0;
          const n = Number(year);
          return Number.isFinite(n) ? n : -1;
        };
        const jumpToPublication = (id, year) => {
          setActive(year);
          requestAnimationFrame(() => {
            const safeId = window.CSS?.escape ? CSS.escape(String(id)) : String(id).replace(/"/g, '\\"');
            const target = document.querySelector(`[data-pub-id="${safeId}"]`);
            if (!target) return;
            target.scrollIntoView({ behavior: "smooth", block: "center" });
            target.classList.add("is-flash");
            window.setTimeout(() => target.classList.remove("is-flash"), 1300);
          });
        };
        const normalizeTitleKey = (value = "") =>
          String(value)
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, " ")
            .trim();
        const jumpToPublicationByTitle = (title = "", year = "") => {
          if (year) setActive(year);
          const key = normalizeTitleKey(title);
          if (!key) return;
          requestAnimationFrame(() => {
            const cards = [...document.querySelectorAll(".pub-entry[data-title]")];
            const target = cards.find((card) => {
              const t = card.getAttribute("data-title") || "";
              return normalizeTitleKey(t) === key;
            });
            if (!target) return;
            target.scrollIntoView({ behavior: "smooth", block: "center" });
            target.classList.add("is-flash");
            window.setTimeout(() => target.classList.remove("is-flash"), 1300);
          });
        };
        const openAuthorModal = (authorName) => {
          const rows = (authorsToEntries.get(authorName) || []).sort(
            (a, b) => orderForYear(b.year) - orderForYear(a.year)
          );
          modalTitleEl.textContent = `${authorName} - Publications`;
          authorProfileNameEl.textContent = authorName;
          const profileImage = getMemberProfileImage(authorName);
          authorProfileImageEl.src = profileImage;
          authorProfileImageEl.alt = `${authorName} profile image`;
          const sid = getMemberScopusId(authorName);
          if (sid) {
            authorProfileScopusLinkEl.href = getScopusUrl(sid);
            authorProfileScopusLinkEl.style.display = "";
          } else {
            authorProfileScopusLinkEl.style.display = "none";
          }
          if (!rows.length) {
            modalBodyEl.innerHTML = '<p class="publication-authors">No entries found.</p>';
          } else {
            modalBodyEl.innerHTML = rows
              .map(
                (row) => `
                  <article class="author-paper-item">
                    <button type="button" class="author-paper-jump" data-jump-id="${esc(row.id)}" data-jump-year="${esc(row.year)}" data-jump-title="${esc(row.title || "")}" aria-label="Go to publication">↗</button>
                    <h3>${esc(row.title)}</h3>
                    <p class="author-paper-journal">${esc(row.journal || "Journal information")}</p>
                    <p>${renderAuthorsInline(getDisplayAuthors(row))}</p>
                  </article>
                `
              )
              .join("");
          }
          if (!modalEl.open) modalEl.showModal();
        };
        const closeAuthorModal = () => {
          if (modalEl.open) modalEl.close();
        };
        const indexAuthors = (entry) => {
          const tokens = splitAuthors(getDisplayAuthors(entry));
          const seen = new Set();
          tokens.forEach((token) => {
            const parsed = parseAuthorToken(token);
            const member = resolveMember(parsed.base);
            if (!member || seen.has(member.name)) return;
            seen.add(member.name);
            if (!authorsToEntries.has(member.name)) authorsToEntries.set(member.name, []);
            authorsToEntries.get(member.name).push(entry);
          });
        };
        const isLikelyIconPlaceholder = (src = "") => {
          const v = String(src || "").trim().toLowerCase();
          if (!v) return true;
          if (/\.(pdf)(\?|$)/i.test(v)) return true;
          if (v.includes("icon_pdf") || v.includes("pdficon") || v.includes("/skin/") || v.includes("doc.gif")) return true;
          // tiny inlined images are usually board icons, not graphical abstracts
          if (v.startsWith("data:image") && v.length < 10000) return true;
          return false;
        };
        const pickGraphicalAbstractSrc = (item, fallbackImg) => {
          const candidates = Array.isArray(item?.images) ? item.images : [];
          const valid = candidates.find((src) => !isLikelyIconPlaceholder(src));
          return valid || fallbackImg;
        };

        const renderEntries = (year, entries) => {
          if (!entries || !entries.length) {
            catalogEl.innerHTML = `<p class="publication-authors">No publication entries found for ${year}.</p>`;
            return;
          }

          const rows = entries
            .map((item, idx) => {
              const no = esc(item.no || String(entries.length - idx).padStart(2, "0"));
              const title = esc(item.title || "Untitled record");
              const journalRaw = item.journal || "";
              const journal = esc(journalRaw);
              const authorsDisplay = getDisplayAuthors(item);
              const authorsHtml = renderAuthors(authorsDisplay);
              const pdf = item.pdf || "";
              const fallbackImg = "./assets/publication-placeholder.svg";
              const metrics = getJournalCategoryMetrics(journalRaw);
              const imageSrc = pickGraphicalAbstractSrc(item, fallbackImg);
              const imgHtml = `<figure class="pub-entry-media"><img src="${esc(imageSrc)}" alt="Graphical abstract for ${title}" loading="lazy" onerror="this.onerror=null;this.src='${fallbackImg}'" /></figure>`;
              const pdfHtml = pdf
                ? `<a class="pub-entry-link" href="${esc(pdf)}" download>PDF</a>`
                : "";
              const quartileChip =
                metrics.quartile && metrics.quartile !== "-"
                  ? `<span class="metric-chip metric-quartile">${esc(metrics.source)} ${esc(metrics.quartile)}</span>`
                  : "";
              const percentileText = quartileToTopPercent(metrics.quartile);
              const percentileChip = percentileText
                ? `<span class="metric-chip metric-percentile">${esc(percentileText)}</span>`
                : "";
              const categoryChip = metrics.category
                ? `<span class="metric-chip metric-category">${esc(metrics.category)}</span>`
                : "";
              const indexChip = metrics.indexedIn
                ? `<span class="metric-chip metric-index">${esc(metrics.indexedIn)}</span>`
                : "";
              const pubId = esc(item.id || `${year}-${idx + 1}`);

              return `
                <article class="pub-entry" data-pub-id="${pubId}" data-title="${title}">
                  <div class="pub-entry-no">${no}</div>
                  <div class="pub-entry-main">
                    ${imgHtml}
                    <div class="pub-title-row">
                      ${pdfHtml}
                      <h3 class="pub-entry-title">${title}</h3>
                    </div>
                    <div class="pub-journal-row">
                      <p class="pub-entry-journal">${journal}</p>
                      <div class="pub-entry-metrics">
                        ${quartileChip}
                        ${percentileChip}
                        ${categoryChip}
                        ${indexChip}
                      </div>
                    </div>
                    <p class="pub-entry-authors">${authorsHtml}</p>
                  </div>
                </article>
              `;
            })
            .join("");

          catalogEl.innerHTML = rows;
        };

        const setActive = (year) => {
          [...filterEl.querySelectorAll("button")].forEach((btn) => {
            const active = btn.dataset.year === year;
            btn.classList.toggle("is-active", active);
            btn.setAttribute("aria-selected", active ? "true" : "false");
          });
          renderEntries(year, allData[year] || []);
        };

        Promise.all([
          window.ASLData?.loadPublications?.() ?? fetch("./assets/publication-data.json").then((r) => r.json()),
          window.ASLData?.loadMembers?.() ??
            fetch("./assets/member-data.json").then((r) => (r.ok ? r.json() : {})).catch(() => ({}))
        ])
          .then(([payload, memberPayload]) => {
            allData = payload;
            buildMemberPhotoMap(memberPayload);
            Object.keys(allData).forEach((year) => {
              allData[year].forEach((item, idx) => {
                item.year = year;
                item.id = item.source_key || `${year}-${idx + 1}`;
                indexAuthors(item);
              });
            });
            const years = Object.keys(allData).sort((a, b) => orderForYear(b) - orderForYear(a));
            filterEl.innerHTML = years
              .map(
                (y, i) =>
                  `<button class="pub-year-btn ${i === 0 ? "is-active" : ""}" data-year="${y}" role="tab" aria-selected="${i === 0 ? "true" : "false"}">${y}</button>`
              )
              .join("");

            filterEl.addEventListener("click", (e) => {
              const btn = e.target.closest("button[data-year]");
              if (!btn) return;
              setActive(btn.dataset.year);
            });

            catalogEl.addEventListener("click", (e) => {
              const chip = e.target.closest(".author-chip[data-author]");
              if (chip) {
                openAuthorModal(chip.dataset.author);
              }
            });

            modalBodyEl.addEventListener("click", (e) => {
              const jumpBtn = e.target.closest("button.author-paper-jump[data-jump-id][data-jump-year]");
              if (!jumpBtn) return;
              closeAuthorModal();
              jumpToPublication(jumpBtn.dataset.jumpId, jumpBtn.dataset.jumpYear);
              window.setTimeout(() => {
                const safeId = window.CSS?.escape
                  ? CSS.escape(String(jumpBtn.dataset.jumpId || ""))
                  : String(jumpBtn.dataset.jumpId || "").replace(/"/g, '\\"');
                const found = document.querySelector(`[data-pub-id="${safeId}"]`);
                if (!found && jumpBtn.dataset.jumpTitle) {
                  jumpToPublicationByTitle(jumpBtn.dataset.jumpTitle, jumpBtn.dataset.jumpYear || "");
                }
              }, 180);
            });
            modalCloseBtn.addEventListener("click", closeAuthorModal);
            modalEl.addEventListener("click", (e) => {
              if (e.target === modalEl) closeAuthorModal();
            });

            if (years.length) {
              setActive(years[0]);
              const params = new URLSearchParams(window.location.search);
              const targetYear = params.get("year");
              const targetId = params.get("pub");
              const targetTitle = params.get("title");
              const targetAuthor = params.get("author");
              if (targetAuthor) {
                window.setTimeout(() => openAuthorModal(decodeURIComponent(targetAuthor)), 120);
              } else if (targetYear && targetId) {
                window.setTimeout(() => {
                  jumpToPublication(targetId, targetYear);
                  window.setTimeout(() => {
                    const safeId = window.CSS?.escape ? CSS.escape(String(targetId)) : String(targetId).replace(/"/g, '\\"');
                    const found = document.querySelector(`[data-pub-id="${safeId}"]`);
                    if (!found && targetTitle) jumpToPublicationByTitle(targetTitle, targetYear);
                  }, 180);
                }, 80);
              } else if (targetYear && targetTitle) {
                window.setTimeout(() => jumpToPublicationByTitle(targetTitle, targetYear), 80);
              }
            }
          })
          .catch(() => {
            catalogEl.innerHTML =
              '<p class="publication-authors">Failed to load publication data.</p>';
          });
      })();
    </script>
    <script>
      (function() {
        const btn = document.getElementById('backToTopBtn');
        window.addEventListener('scroll', function() {
          btn.classList.toggle('visible', window.scrollY > 300);
        });
      })();
    </script>
  </body>
</html>
