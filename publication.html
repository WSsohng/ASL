      </section>
    </main>

    <script src="./script.js"></script>
    <script>
      (() => {
        const frame = document.getElementById("pubLegacyFrame");
        const buttons = [...document.querySelectorAll(".pub-year-btn[data-src]")];
        if (!frame || !buttons.length) return;
        buttons.forEach((btn) => {
          btn.addEventListener("click", () => {
            const src = btn.getAttribute("data-src");
            if (!src) return;
            frame.src = src;
            buttons.forEach((b) => {
              const active = b === btn;
              b.classList.toggle("is-active", active);
              b.setAttribute("aria-selected", active ? "true" : "false");
            });
          });
        });
      })();
    </script>
