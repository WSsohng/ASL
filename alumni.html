<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASL | Alumni Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="./index.html">
        <span class="brand-mark">ASL</span>
        <span class="brand-text">Analytical Spectroscopy Laboratory</span>
      </a>
      <nav class="nav">
        <a href="./index.html#about">About</a>
        <a href="./index.html#research">Research</a>
        <a href="./publication.html">Publications</a>
        <a href="./index.html#professor">Professor</a>
        <a href="./index.html#members">Members</a>
        <a href="./gallery.html">Gallery</a>
      </nav>
      <a class="header-cta" href="./alumni.html">Alumni</a>
    </header>

    <main class="page-shell">
      <div class="section-head">
        <div>
          <p class="eyebrow">Members</p>
          <h1>Alumni Archive</h1>
        </div>
        <a class="btn btn-ghost" href="http://asl.hanyang.ac.kr/03.php?sub=1&ss=4">Original Board</a>
      </div>

      <div class="alumni-grid" id="alumniGrid">
        <article class="alumni-item">
          <div class="alumni-photo-wrap">
            <img class="alumni-photo" src="./assets/publication-placeholder.svg" alt="Loading alumni profile" loading="lazy" />
          </div>
          <div class="alumni-meta">
            <h3>Loading alumni records...</h3>
          </div>
        </article>
      </div>
    </main>

    <script>
      (() => {
        const grid = document.getElementById("alumniGrid");
        if (!grid) return;

        const esc = (value = "") =>
          String(value)
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;")
            .replaceAll('"', "&quot;")
            .replaceAll("'", "&#39;");

        const cleanText = (value = "") => String(value).replace(/\s+/g, " ").trim();

        const composeCareer = (person) => {
          const careerEn = cleanText(person.career_en || "");
          const careerKo = cleanText(person.career_ko || "");
          const careerRaw = cleanText(person.career || "");
          if (careerEn && careerKo) return `${careerEn} (${careerKo})`;
          if (careerEn) return careerEn;
          if (careerKo) return careerKo;
          return careerRaw;
        };

        fetch("./assets/member-data.json")
          .then((r) => r.json())
          .then((payload) => {
            const alumni = Array.isArray(payload?.alumni) ? payload.alumni : [];
            if (!alumni.length) {
              grid.innerHTML = '<article class="alumni-item"><div class="alumni-meta"><h3>No alumni records found.</h3></div></article>';
              return;
            }

            grid.innerHTML = alumni
              .map((person) => {
                const name = cleanText(person.name || "ASL Alumni");
                const nameKo = cleanText(person.name_ko || "");
                const career = composeCareer(person);
                const email = cleanText(person.email || "");
                const image = person.image || "./assets/publication-placeholder.svg";
                const nameKoHtml = nameKo ? `<p class="alumni-role">${esc(nameKo)}</p>` : "";
                const careerHtml = career ? `<p class="alumni-career">${esc(career)}</p>` : "";
                const emailHtml = email
                  ? `<a class="alumni-email" href="mailto:${esc(email)}">${esc(email)}</a>`
                  : '<p class="alumni-email alumni-email-empty">No public email listed</p>';

                return `
                  <article class="alumni-item">
                    <div class="alumni-photo-wrap">
                      <img class="alumni-photo" src="${esc(image)}" alt="${esc(name)} profile photo" loading="lazy" onerror="this.onerror=null;this.src='./assets/publication-placeholder.svg'" />
                    </div>
                    <div class="alumni-meta">
                      <h3>${esc(name)}</h3>
                      ${nameKoHtml}
                      ${careerHtml}
                      ${emailHtml}
                    </div>
                  </article>
                `;
              })
              .join("");
          })
          .catch(() => {
            grid.innerHTML = '<article class="alumni-item"><div class="alumni-meta"><h3>Failed to load alumni data.</h3></div></article>';
          });
      })();
    </script>
  </body>
</html>
